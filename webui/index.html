<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>javScraper26</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260416c" />
  </head>
  <body>
    <div class="mode-shell">
      <section class="mode-hero card">
        <div>
          <p class="eyebrow">javScraper26</p>
          <h1>选择启动模式</h1>
          <p class="subtitle mode-copy">
            普通模式继续保留当前批量刮削与落盘体验。Emby 服务模式则把当前应用变成一个给 Emby 插件调用的元数据后端，同时提供轻量日志页。
          </p>
        </div>
      </section>

      <section class="mode-grid">
        <a class="mode-card card" href="/webui">
          <span class="mode-tag">普通 WebUI</span>
          <h2>目录扫描与批量刮削</h2>
          <p>继续使用现有扫描目录、连通性校验、批量抓取和落盘整理流程。</p>
          <span class="mode-link">进入普通模式</span>
        </a>

        <a class="mode-card card" href="/service">
          <span class="mode-tag">Emby 服务模式</span>
          <h2>Emby 插件后端与日志页</h2>
          <p>提供电影元数据和图片接口，适合给 Emby 插件配置为远程刮削服务。</p>
          <span class="mode-link">进入服务模式</span>
        </a>
      </section>
    </div>
  </body>
</html>
