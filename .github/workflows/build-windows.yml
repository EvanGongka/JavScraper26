name: Build Windows Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies for tests
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        shell: cmd
        run: |
          python -m unittest discover -s tests -p "test_*.py"

      - name: Run Windows build script
        shell: cmd
        run: scripts\build_windows_exe.bat

      - name: Smoke test packaged app
        shell: pwsh
        env:
          JAVSCRAPER_DISABLE_BROWSER: "1"
          JAVSCRAPER_PORT: "8765"
        run: |
          $exePath = Resolve-Path "dist\javScraper26\javScraper26.exe"
          $proc = Start-Process -FilePath $exePath -PassThru
          try {
            $healthy = $false
            for ($i = 0; $i -lt 20; $i++) {
              Start-Sleep -Milliseconds 500
              if ($proc.HasExited) {
                throw "Packaged app exited early with code $($proc.ExitCode)."
              }
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:8765/" -UseBasicParsing -TimeoutSec 2
                if ($response.StatusCode -eq 200) {
                  $healthy = $true
                  break
                }
              } catch {
              }
            }

            if (-not $healthy) {
              throw "Packaged app did not become healthy on http://127.0.0.1:8765/."
            }
          } finally {
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Prepare release bundle
        shell: pwsh
        run: |
          $bundleDir = "release\javScraper26-windows"
          $zipPath = "release\javScraper26-windows.zip"

          if (Test-Path $bundleDir) {
            Remove-Item $bundleDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $bundleDir | Out-Null

          Copy-Item "dist\javScraper26" -Destination $bundleDir -Recurse
          Copy-Item "LICENSE" -Destination $bundleDir
          Copy-Item "README.md" -Destination $bundleDir

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "$bundleDir\*" -DestinationPath $zipPath

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: javScraper26-windows
          path: |
            release/javScraper26-windows/
            release/javScraper26-windows.zip
          if-no-files-found: error

      - name: Publish Windows release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes || gh release view "$tag"
          fi

          gh release upload "$tag" "release/javScraper26-windows.zip#javScraper26-windows.zip" --clobber
