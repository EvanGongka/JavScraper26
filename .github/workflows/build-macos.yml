name: Build macOS Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run macOS build script
        shell: bash
        run: bash scripts/build_macos_app.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: javScraper26-macos
          path: |
            release/javScraper26-macos/
            release/javScraper26-macos.zip
          if-no-files-found: error

      - name: Publish macOS release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes || gh release view "$tag"
          fi

          gh release upload "$tag" "release/javScraper26-macos.zip#javScraper26-macos.zip" --clobber
